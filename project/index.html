<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>social chat</title>
    <!-- 首页图标 -->
    <link rel="icon" href="#" />
    <!-- 接入全局前置样式 -->
    <link rel="stylesheet" href="./css/base.css" />
    <!-- 接入登录页面的样式 -->
    <link rel="stylesheet" href="./css/sign_in.css" />
  </head>
  <body>
    <div class="sign-in">
      <div class="background"></div>
      <div class="app-name">Liko</div>
      <div class="content">
        <div class="copy">
          <h3>Create an account</h3>
          <p>Enter your email to sign up for this app</p>
        </div>
        <div class="input">
          <input type="text" placeholder="input your Id" />
          <input type="password" placeholder="input your password">
          <button>sign in</button>
        </div>
        <div class="divider">
          <span>or</span>
        </div>
        <div class="btns">
          <button><i class="iconfont"></i>sign in with wechat</button>
          <button><i class="iconfont"></i>sign in with qq</button>
        </div>
        <div class="more-info">
          <div class="first-row">
            <span>By clicking continue, you agree to</span>
            <span> our Terms of Service</span>
          </div>
          <div class="next-row">
            <span>and</span> <span>Privacy Policy</span>
          </div>
        </div>
      </div>
      </div>
    </div>
  </body>
</html>
